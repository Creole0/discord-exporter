name: Discord Weekly Report

on:
  schedule:
    # 每周一 UTC 01:00（北京时间 09:00）
    - cron: '0 1 * * 1'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests openai

      - name: Run weekly report
        run: python daily_report.py
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
          LARK_WEBHOOK: ${{ secrets.LARK_WEBHOOK }}

      - name: Upload source artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: discord-weekly-source-${{ github.run_id }}
          path: exports/
          if-no-files-found: ignore
          retention-days: 30
