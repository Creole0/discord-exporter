<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord 论坛导出工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #5865f2;
            font-size: 2.5em;
        }
        
        .subtitle {
            text-align: center;
            color: #8e9297;
            margin-bottom: 40px;
        }
        
        .card {
            background: #2f3136;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .card-title {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #5865f2;
            border-radius: 2px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #b9bbbe;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="password"],
        input[type="date"],
        input[type="datetime-local"],
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            background: #40444b;
            color: #fff;
            font-size: 14px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            box-shadow: 0 0 0 2px #5865f2;
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
            font-family: monospace;
        }
        
        .row {
            display: flex;
            gap: 15px;
        }
        
        .row > div {
            flex: 1;
        }
        
        .format-options {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .format-option {
            flex: 1;
            padding: 15px;
            background: #40444b;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .format-option:hover {
            background: #4f545c;
        }
        
        .format-option.selected {
            border-color: #5865f2;
            background: rgba(88, 101, 242, 0.2);
        }
        
        .format-option input {
            display: none;
        }
        
        .format-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #5865f2;
            color: #fff;
        }
        
        .btn-primary:hover {
            background: #4752c4;
        }
        
        .btn-primary:disabled {
            background: #4f545c;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #4f545c;
            color: #fff;
            margin-top: 10px;
        }
        
        .btn-secondary:hover {
            background: #5d6269;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        
        .status.success {
            background: rgba(67, 181, 129, 0.2);
            border: 1px solid #43b581;
            display: block;
        }
        
        .status.error {
            background: rgba(240, 71, 71, 0.2);
            border: 1px solid #f04747;
            display: block;
        }
        
        .status.loading {
            background: rgba(88, 101, 242, 0.2);
            border: 1px solid #5865f2;
            display: block;
        }
        
        .help-text {
            font-size: 12px;
            color: #72767d;
            margin-top: -10px;
            margin-bottom: 15px;
        }
        
        .token-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 10px;
        }
        
        .token-status.set {
            background: #43b581;
        }
        
        .token-status.not-set {
            background: #f04747;
        }
        
        .download-link {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #43b581;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
        
        .download-link:hover {
            background: #3ca374;
        }

        .inline-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }

        .btn-inline {
            display: inline-block;
            border: none;
            border-radius: 6px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
        }

        .btn-generate {
            background: #5865f2;
        }

        .btn-generate:hover {
            background: #4752c4;
        }

        .btn-preview {
            background: #3da9fc;
        }

        .btn-preview:hover {
            background: #2d95df;
        }

        .report-card {
            display: none;
        }

        .report-frame {
            width: 100%;
            height: 600px;
            border: 1px solid #4f545c;
            border-radius: 8px;
            background: #111;
            margin-top: 10px;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Discord 频道导出工具</h1>
        <p class="subtitle">导出论坛帖子和普通频道消息到Excel/TXT/HTML</p>
        
        <!-- Token设置 -->
        <div class="card">
            <div class="card-title">
                Bot Token 设置
                <span id="tokenStatus" class="token-status not-set">未设置</span>
            </div>
            <label>Bot Token</label>
            <input type="password" id="botToken" placeholder="输入你的Bot Token...">
            <p class="help-text">输入你的Discord Bot Token</p>
            <button class="btn btn-secondary" onclick="setToken()">保存Token</button>

            <div class="card-title" style="margin-top: 22px;">
                Gemini API Key 设置
                <span id="geminiStatus" class="token-status not-set">未设置</span>
            </div>
            <label>Gemini API Key</label>
            <input type="password" id="geminiKey" placeholder="输入你的 Gemini API Key...">
            <p class="help-text">用于根据导出TXT生成可视化HTML报告</p>
            <button class="btn btn-secondary" onclick="setGeminiKey()">保存Gemini Key</button>
        </div>
        
        <!-- 导出设置 -->
        <div class="card">
            <div class="card-title">导出设置</div>
            
            <label>频道链接（每行一个，支持论坛和普通频道）</label>
            <textarea id="forumUrls" placeholder="https://discord.com/channels/服务器ID/频道ID&#10;https://discord.com/channels/服务器ID/频道ID"></textarea>
            <p class="help-text">支持论坛频道和普通文字频道，每行一个链接</p>
            
            <div class="row">
                <div>
                    <label>开始时间</label>
                    <input type="datetime-local" id="dateFrom">
                </div>
                <div>
                    <label>结束时间</label>
                    <input type="datetime-local" id="dateTo">
                </div>
            </div>
            <p class="help-text">留空则导出全部帖子，可精确选择到具体小时和分钟</p>
            
            <label>导出格式</label>
            <div class="format-options">
                <label class="format-option selected" onclick="selectFormat(this, 'excel')">
                    <input type="radio" name="format" value="excel" checked>
                    <div class="format-icon">📊</div>
                    <div>Excel</div>
                </label>
                <label class="format-option" onclick="selectFormat(this, 'txt')">
                    <input type="radio" name="format" value="txt">
                    <div class="format-icon">📝</div>
                    <div>TXT</div>
                </label>
                <label class="format-option" onclick="selectFormat(this, 'html')">
                    <input type="radio" name="format" value="html">
                    <div class="format-icon">🌐</div>
                    <div>HTML</div>
                </label>
            </div>
            
            <button class="btn btn-primary" id="exportBtn" onclick="startExport()">
                开始导出
            </button>
            
            <div id="status" class="status"></div>
        </div>

        <div class="card report-card" id="reportCard">
            <div class="card-title">可视化报告预览</div>
            <p class="help-text" style="margin-top: 0;">点击导出成功后的“生成可视化报告”按钮后，这里会显示预览</p>
            <iframe id="reportFrame" class="report-frame" title="可视化报告预览"></iframe>
            <div class="inline-actions">
                <a id="reportDownloadLink" class="btn-inline btn-preview" target="_blank">📥 下载可视化报告</a>
            </div>
        </div>
    </div>
    
    <script>
        let selectedFormat = 'excel';
        let latestExportFilename = '';
        let latestTxtFilename = '';
        let latestReportFilename = '';
        
        // 页面加载时检查Token状态
        async function checkTokenStatus() {
            try {
                const res = await fetch('/api/check_token');
                const data = await res.json();
                if (data.has_token) {
                    document.getElementById('tokenStatus').textContent = '已设置(环境变量)';
                    document.getElementById('tokenStatus').className = 'token-status set';
                }
                if (data.has_gemini) {
                    document.getElementById('geminiStatus').textContent = '已设置';
                    document.getElementById('geminiStatus').className = 'token-status set';
                }
            } catch (e) {
                console.error('检查Token失败:', e);
            }
        }
        
        // 页面加载时执行
        checkTokenStatus();
        
        function selectFormat(el, format) {
            document.querySelectorAll('.format-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            el.classList.add('selected');
            selectedFormat = format;
        }
        
        async function setToken() {
            const token = document.getElementById('botToken').value.trim();
            if (!token) {
                alert('请输入Token');
                return;
            }
            
            try {
                const res = await fetch('/api/set_token', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({token})
                });
                
                if (res.ok) {
                    document.getElementById('tokenStatus').textContent = '已设置';
                    document.getElementById('tokenStatus').className = 'token-status set';
                    alert('Token已保存！');
                }
            } catch (e) {
                alert('保存失败：' + e.message);
            }
        }

        async function setGeminiKey() {
            const key = document.getElementById('geminiKey').value.trim();
            if (!key) {
                alert('请输入 Gemini API Key');
                return;
            }

            try {
                const res = await fetch('/api/set_gemini_key', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({key})
                });

                const data = await res.json();
                if (res.ok && data.success) {
                    document.getElementById('geminiStatus').textContent = '已设置';
                    document.getElementById('geminiStatus').className = 'token-status set';
                    alert('Gemini API Key 已保存！');
                } else {
                    alert('保存失败：' + (data.error || '未知错误'));
                }
            } catch (e) {
                alert('保存失败：' + e.message);
            }
        }
        
        async function startExport() {
            const urls = document.getElementById('forumUrls').value.trim().split('\n').filter(u => u.trim());
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;
            
            if (urls.length === 0) {
                showStatus('error', '请输入至少一个频道链接');
                return;
            }
            
            const btn = document.getElementById('exportBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>导出中...';
            
            showStatus('loading', '正在启动导出任务...');
            
            try {
                const res = await fetch('/api/export', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        urls,
                        date_from: dateFrom,
                        date_to: dateTo,
                        format: selectedFormat
                    })
                });
                
                const data = await res.json();
                
                if (data.error) {
                    showStatus('error', data.error);
                    btn.disabled = false;
                    btn.innerHTML = '开始导出';
                } else if (data.status === 'started') {
                    // 任务已启动，开始轮询状态
                    pollTaskStatus();
                } else if (data.status === 'busy') {
                    showStatus('error', data.message);
                    btn.disabled = false;
                    btn.innerHTML = '开始导出';
                }
            } catch (e) {
                showStatus('error', '导出失败：' + e.message);
                btn.disabled = false;
                btn.innerHTML = '开始导出';
            }
        }

        function renderExportSuccess(status) {
            latestExportFilename = status.filename || (status.result && status.result.export_filename) || '';
            latestTxtFilename = status.txt_filename || (status.result && status.result.txt_filename) || '';
            const reportActions = latestReportFilename ? `
                <a href="/api/report?filename=${encodeURIComponent(latestReportFilename)}" target="_blank" class="btn-inline btn-preview">👀 打开上次报告</a>
                <a href="/api/download/${latestReportFilename}" class="btn-inline btn-preview">📥 下载上次报告</a>
            ` : '';

            showStatus('success', `
                导出成功！<br>
                帖子数：${status.result.threads}<br>
                消息数：${status.result.messages}<br>
                <div class="inline-actions">
                    <a href="/api/download/${latestExportFilename}" class="download-link">📥 下载导出文件</a>
                    <button id="visualizeBtn" class="btn-inline btn-generate" onclick="generateVisualization()">✨ 生成可视化报告</button>
                    ${reportActions}
                </div>
            `);
        }
        
        async function pollTaskStatus() {
            try {
                const res = await fetch('/api/status');
                const status = await res.json();
                
                if (status.is_running) {
                    showStatus('loading', status.progress || '处理中...');
                    setTimeout(pollTaskStatus, 2000); // 2秒后再次检查
                } else {
                    const btn = document.getElementById('exportBtn');
                    btn.disabled = false;
                    btn.innerHTML = '开始导出';
                    
                    if (status.error) {
                        showStatus('error', status.error);
                    } else if (status.result) {
                        renderExportSuccess(status);
                    }
                }
            } catch (e) {
                console.error('状态检查失败:', e);
                setTimeout(pollTaskStatus, 5000); // 出错了等5秒再试
            }
        }

        async function generateVisualization() {
            if (!latestTxtFilename) {
                showStatus('error', '未找到可视化所需的TXT文件，请先完成一次导出');
                return;
            }

            const btn = document.getElementById('visualizeBtn');
            if (btn) {
                btn.disabled = true;
                btn.textContent = '生成中...';
            }

            showStatus('loading', '正在调用 Gemini 生成可视化报告，请稍候...');

            try {
                const res = await fetch('/api/visualize', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({txt_filename: latestTxtFilename})
                });
                const data = await res.json();

                if (!res.ok || data.error) {
                    showStatus('error', data.error || '可视化生成失败');
                    if (btn) {
                        btn.disabled = false;
                        btn.textContent = '✨ 生成可视化报告';
                    }
                    return;
                }

                latestReportFilename = data.filename;
                showStatus('success', `
                    可视化报告生成成功！<br>
                    <div class="inline-actions">
                        <a href="/api/download/${latestExportFilename}" class="download-link">📥 下载导出文件</a>
                        <a href="/api/report?filename=${encodeURIComponent(latestReportFilename)}" target="_blank" class="btn-inline btn-preview">👀 新窗口打开报告</a>
                        <a href="/api/download/${latestReportFilename}" class="btn-inline btn-preview">📥 下载可视化报告</a>
                    </div>
                `);

                const reportCard = document.getElementById('reportCard');
                const reportFrame = document.getElementById('reportFrame');
                const reportDownload = document.getElementById('reportDownloadLink');
                reportCard.style.display = 'block';
                reportFrame.src = `/api/report?filename=${encodeURIComponent(latestReportFilename)}`;
                reportDownload.href = `/api/download/${latestReportFilename}`;
            } catch (e) {
                showStatus('error', '可视化生成失败：' + e.message);
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = '✨ 生成可视化报告';
                }
            }
        }
        
        function showStatus(type, message) {
            const status = document.getElementById('status');
            status.className = 'status ' + type;
            status.innerHTML = message;
        }
    </script>
</body>
</html>
